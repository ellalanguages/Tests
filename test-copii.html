<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pr:#7c3aed;--pl:#ede9fe;--bg:#faf5ff;--white:#fff;--text:#1e1b4b;--mu:#6b7280;--bo:#e5e7eb;--V:#6366f1;--A:#f59e0b;--R:#10b981;--K:#ef4444}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%}
.hdr{background:var(--white);border-bottom:2px solid var(--pl);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;gap:10px}
.brand{display:flex;flex-direction:column;line-height:1.15}
.bname{font-size:1rem;font-weight:900;color:var(--pr)}
.bsub{font-size:.6rem;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.09em}
.langs{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.lb{border:2px solid var(--bo);background:var(--white);color:var(--mu);padding:5px 10px;border-radius:8px;cursor:pointer;font-size:.76rem;font-weight:700;min-height:34px;-webkit-tap-highlight-color:transparent}
.lb.on{background:var(--pr);color:#fff;border-color:var(--pr)}
.hero{max-width:520px;margin:36px auto 0;padding:0 16px 48px;text-align:center}
.hero-ico{font-size:2.8rem;margin-bottom:10px;display:block}
.hero h1{font-size:1.75rem;font-weight:900;margin-bottom:12px;line-height:1.25;color:var(--pr)}
.hero p{color:var(--mu);font-size:.97rem;line-height:1.65;margin-bottom:24px}
.btn{background:var(--pr);color:#fff;border:none;padding:15px 28px;border-radius:14px;font-size:1rem;font-weight:800;cursor:pointer;width:100%;max-width:300px;min-height:52px;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 14px rgba(124,58,237,.28);display:inline-block}
.metas{display:flex;gap:12px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.meta{display:flex;align-items:center;gap:6px;color:var(--mu);font-size:.85rem}
.dot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0}
.quiz{max-width:520px;margin:20px auto;padding:0 16px;display:none}
.prog-bar-wrap{margin-bottom:18px}
.prog-lbl{display:flex;justify-content:space-between;color:var(--mu);font-size:.8rem;margin-bottom:6px;font-weight:600}

.qchip{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;background:var(--pl);color:var(--pr);margin-bottom:10px}
.qtxt{font-size:1.05rem;font-weight:700;line-height:1.5;margin-bottom:6px}
.qhint{font-size:.8rem;color:var(--mu);margin-bottom:16px;font-style:italic}
.opts{display:flex;flex-direction:column;gap:14px}
.ocard{background:var(--bg);border:2px solid var(--bo);border-radius:14px;padding:14px}
.otop{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.oico{font-size:1.25rem;flex-shrink:0;line-height:1.3}
.olbl{font-size:.93rem;line-height:1.45;font-weight:500}
.srow{display:flex;align-items:center;gap:8px}
.send{font-size:.76rem;color:var(--mu);font-weight:600;min-width:14px}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:10px;border-radius:5px;outline:none;cursor:pointer;background:#e5e7eb;touch-action:pan-y}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);background:var(--pr)}
input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid #fff;background:var(--pr)}
.sval{font-size:.82rem;font-weight:800;min-width:20px;text-align:center;color:var(--pr)}
.socq{padding:16px;background:var(--bg);border:2px solid var(--pl);border-radius:14px}
.socpoles{display:flex;justify-content:space-between;margin-bottom:10px;gap:8px}
.pole{font-size:.9rem;font-weight:700;max-width:46%;line-height:1.3}
.pole.r{text-align:right}
.navbtns{display:flex;gap:10px;margin-top:16px}
.btn2{background:var(--white);color:var(--text);border:2px solid var(--bo);padding:13px 16px;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;min-height:50px;flex:1;-webkit-tap-highlight-color:transparent}
.btn3{background:var(--pr);color:#fff;border:none;padding:13px 16px;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;min-height:50px;flex:2;-webkit-tap-highlight-color:transparent}

.reshdr{text-align:center;margin-bottom:24px}

.reshdr h2{font-size:1.5rem;font-weight:900;color:var(--pr);margin-bottom:6px}
.reshdr p{color:var(--mu);font-size:.9rem}
.rc{background:var(--white);border:2px solid var(--pl);border-radius:16px;padding:18px;margin-bottom:14px}
.rct{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:12px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:460px){.rgrid{grid-template-columns:1fr}}
.cwrap{max-width:260px;margin:0 auto}
.sbars{display:flex;flex-direction:column;gap:12px}
.sbrow{display:flex;flex-direction:column;gap:5px}
.sbhd{display:flex;justify-content:space-between}
.sbn{font-size:.84rem;font-weight:700}
.sbp{font-size:.84rem;font-weight:800}
.sbtr{height:10px;background:var(--bo);border-radius:99px;overflow:hidden}
.sbfi{height:100%;border-radius:99px}
.dcard{background:var(--white);border:2px solid var(--pl);border-radius:16px;padding:20px;margin-bottom:14px}
.dbadge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:.74rem;font-weight:800;margin-bottom:10px}

.dcard p{color:var(--mu);line-height:1.65;font-size:.9rem;margin-bottom:14px}
.tips{display:flex;flex-wrap:wrap;gap:7px}
.tip{background:var(--bg);border:2px solid var(--bo);border-radius:8px;padding:6px 11px;font-size:.8rem;font-weight:500}
.socres{background:var(--white);border:2px solid var(--pl);border-radius:16px;padding:18px;margin-bottom:14px}
.soclbls{display:flex;justify-content:space-between;font-size:.8rem;color:var(--mu);font-weight:700}
.soctr{height:12px;background:var(--bo);border-radius:99px;overflow:hidden;margin:10px 0}
.socfi{height:100%;background:linear-gradient(90deg,#8b5cf6,#a78bfa);border-radius:99px}
.endbtns{display:flex;gap:10px;flex-wrap:wrap}

function gl(key){return T[lang]&&T[lang][key]?T[lang][key]:'';}

function renderHero(){var d=T[lang];if(!d)return;document.getElementById('hero-title').textContent=d.title;document.getElementById('hero-desc').textContent=d.desc;document.getElementById('meta-q').textContent=d.mq;document.getElementById('meta-t').textContent=d.mt;document.getElementById('meta-f').textContent=d.mf;document.getElementById('start-btn').textContent=d.start;}

function renderQ(){var q=Q[cQ],tot=Q.length,pct=Math.round(cQ/tot*100),d=T[lang];document.getElementById('q-counter').textContent=d.qlbl+' '+(cQ+1)+' '+d.qof+' '+tot;document.getElementById('q-pct').textContent=pct+'%';document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('q-chip').textContent=q.t==='s'?d.chips:d.chip;document.getElementById('q-text').textContent=q.text[lang];document.getElementById('q-hint').textContent=q.t==='s'?d.hints:d.hint;var con=document.getElementById('opts-con');con.innerHTML='';if(q.t==='v'){var wrap=document.createElement('div');wrap.className='opts';if(!answers[cQ]||typeof answers[cQ]!=='object')answers[cQ]={};q.opts.forEach(function(opt,i){var val=answers[cQ][i]!==undefined?answers[cQ][i]:0,color=C[opt.s]||'#7c3aed',card=document.createElement('div');card.className='ocard';card.innerHTML='<div class="otop"><span class="oico">'+opt.e+'</span><span class="olbl">'+opt.t[lang]+'</span></div><div class="srow"><span class="send">0</span><input type="range" min="0" max="5" step="1" value="'+val+'" data-i="'+i+'" data-c="'+color+'"><span class="send">5</span><span class="sval" id="sv'+cQ+'_'+i+'">'+val+'</span></div>';var inp=card.querySelector('input');setTrack(inp,val,color);inp.addEventListener('input',function(){var v=parseInt(this.value),idx=parseInt(this.getAttribute('data-i')),c=this.getAttribute('data-c');if(!answers[cQ]||typeof answers[cQ]!=='object')answers[cQ]={};answers[cQ][idx]=v;var sv=document.getElementById('sv'+cQ+'_'+idx);if(sv)sv.textContent=v;setTrack(this,v,c);});wrap.appendChild(card);});con.appendChild(wrap);}else{var val2=typeof answers[cQ]==='number'?answers[cQ]:5,div=document.createElement('div');div.className='socq';div.innerHTML='<div class="socpoles"><span class="pole">'+q.opts[1].e+' '+q.opts[1].t[lang]+'</span><span class="pole r">'+q.opts[0].t[lang]+' '+q.opts[0].e+'</span></div><input type="range" min="0" max="10" step="1" value="'+val2+'" style="width:100%">';var sl=div.querySelector document.getElementById('dom-area').innerHTML=mkCard(dom,domP,true)+mkCard(sec,secP,false);document.getElementById('soc-area').innerHTML='<div class="socres"><div class="rct">'+d.soclbl+'</div><div class="soclbls"><span>'+d.socl+'</span><span>'+d.socr+'</span></div><div class="soctr"><div class="socfi" style="width:'+socP+'%"></div></div><p style="color:#6b7280;font-size:.88rem;margin-top:6px">'+d.socD[socType]+'</p></div>';var bars=document.getElementById('sbars');bars.innerHTML='';sorted.forEach(function(e){var s=e[0],p=e[1],col=C[s];bars.innerHTML+='<div class="sbrow"><div class="sbhd"><span class="sbn" style="color:'+col+'">'+d.dimN[s]+'</span><span class="sbp" style="color:'+col+'">'+p+'%</span></div><div class="sbtr"><div class="sbfi" style="width:'+p+'%;background:'+col+'"></div></div></div>';});if(chartObj)chartObj.destroy();var ctx=document.getElementById('radarChart').getContext('2d');chartObj=new Chart(ctx,{type:'radar',data:{labels:[d.dimN.V,d.dimN.A,d.dimN.R,d.dimN.K],datasets:[{data:[pcts.V,pcts.A,pcts.R,pcts.K],backgroundColor:'rgba(124,58,237,0.12)',borderColor:'#7c3aed',borderWidth:2,pointBackgroundColor:[C.V,C.A,C.R,C.K],pointRadius:5}]},options:{scales:{r:{min:0,max:100,ticks:{display:false},grid:{color:'#e5e7eb'},pointLabels:{font:{size:11,weight:'700'}}}},plugins:{legend:{display:false}}}});}
