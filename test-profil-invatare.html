<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Test Profil de Învățare</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#4f46e5;--primary-light:#e0e7ff;--accent:#10b981;
  --text:#1e293b;--muted:#64748b;--border:#e2e8f0;--bg:#f8fafc;--white:#fff;
  --V:#6366f1;--A:#f59e0b;--R:#10b981;--K:#ef4444;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%}

/* HEADER */
.header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.logo{font-size:1rem;font-weight:700;color:var(--primary)}
.lang-switcher{display:flex;gap:4px;flex-wrap:wrap}
.lang-btn{border:1px solid var(--border);background:var(--white);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:0.78rem;font-weight:700;min-height:36px}
.lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* HERO */
.hero{max-width:600px;margin:40px auto 0;padding:0 16px 40px;text-align:center}
.hero h1{font-size:1.7rem;font-weight:800;margin-bottom:12px;line-height:1.3}
.hero p{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:28px}
.btn-primary{background:var(--primary);color:#fff;border:none;padding:15px 32px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;max-width:320px;min-height:52px;-webkit-tap-highlight-color:transparent}
.meta-info{display:flex;gap:16px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:.85rem}
.meta-item .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* QUIZ */
.quiz-wrap{max-width:600px;margin:24px auto;padding:0 16px;display:none}
.progress-bar-wrap{margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;color:var(--muted);font-size:.8rem;margin-bottom:6px}
.progress-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .4s}

.question-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.q-label{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
.q-text{font-size:1rem;font-weight:600;line-height:1.55;margin-bottom:20px}
.q-instruction{font-size:.8rem;color:var(--muted);margin-bottom:16px;font-style:italic}

/* SLIDER OPTIONS */
.options-sliders{display:flex;flex-direction:column;gap:18px}
.opt-row{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px}
.opt-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.opt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.opt-text-label{font-size:.9rem;line-height:1.45;color:var(--text)}
.slider-wrap{display:flex;align-items:center;gap:8px}
.slider-min,.slider-max{font-size:.7rem;color:var(--muted);white-space:nowrap;min-width:28px}
.slider-max{text-align:right}
input[type=range]{
  -webkit-appearance:none;appearance:none;flex:1;height:8px;border-radius:4px;outline:none;cursor:pointer;background:#e2e8f0;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--primary);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)
}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--primary);cursor:pointer;border:2px solid #fff}
.slider-val{font-size:.8rem;font-weight:700;min-width:20px;text-align:center;color:var(--primary)}

/* SOCIAL SLIDER */
.social-spectrum{padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:12px}
.spectrum-labels{display:flex;justify-content:space-between;margin-bottom:10px}
.spectrum-label{font-size:.82rem;font-weight:600;color:var(--text);max-width:45%;line-height:1.3}
.spectrum-label.right{text-align:right}

/* NAV */
.nav-btns{display:flex;justify-content:space-between;margin-top:16px;gap:10px}
.btn-sec{background:var(--white);color:var(--text);border:1px solid var(--border);padding:13px 20px;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;flex:1}
.btn-next-wrap{flex:2}
.btn-primary.full{width:100%;min-height:48px}

/* RESULTS */
.results-wrap{max-width:640px;margin:24px auto;padding:0 16px 60px;display:none}
.results-header{text-align:center;margin-bottom:28px}
.results-header h2{font-size:1.5rem;font-weight:800;margin-bottom:6px}
.results-header p{color:var(--muted);font-size:.9rem}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.card h3{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:14px}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:480px){.results-grid{grid-template-columns:1fr}}
.chart-wrap{max-width:280px;margin:0 auto}
.score-bars{display:flex;flex-direction:column;gap:14px}
.score-row{display:flex;flex-direction:column;gap:5px}
.score-row-header{display:flex;justify-content:space-between}
.score-name{font-size:.85rem;font-weight:600}
.score-pct{font-size:.85rem;font-weight:700}
.score-track{height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.score-fill{height:100%;border-radius:99px}
.dominant-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px}
.dominant-badge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:.75rem;font-weight:700;margin-bottom:10px}
.dominant-card h3{font-size:1.1rem;font-weight:700;margin-bottom:8px}
.dominant-card p{color:var(--muted);line-height:1.65;font-size:.9rem;margin-bottom:14px}
.techniques-list{display:flex;flex-wrap:wrap;gap:7px}
.technique-chip{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:.8rem}
.social-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.social-track{height:10px;background:var(--border);border-radius:99px;overflow:hidden;margin:10px 0}
.social-fill{height:100%;background:linear-gradient(90deg,#8b5cf6,#a78bfa);border-radius:99px}
.social-labels{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);font-weight:600}
.action-btns{display:flex;gap:10px;flex-wrap:wrap}
.action-btns .btn-primary{flex:1;min-width:140px}
.action-btns .btn-sec{flex:1;min-width:120px}

@media print{
  .header,.lang-switcher,.action-btns,.hero,.quiz-wrap{display:none!important}
  .results-wrap{display:block!important;margin:0;padding:20px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo" id="logo-text"></div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('ro')">RO</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
  </div>
</div>

<div class="hero" id="hero-section">
  <h1 id="hero-title"></h1>
  <p id="hero-desc"></p>
  <div class="meta-info">
    <div class="meta-item"><span class="dot"></span><span id="meta-q"></span></div>
    <div class="meta-item"><span class="dot"></span><span id="meta-time"></span></div>
    <div class="meta-item"><span class="dot"></span><span id="meta-free"></span></div>
  </div>
  <button class="btn-primary" onclick="startQuiz()" id="start-btn"></button>
</div>

<div class="quiz-wrap" id="quiz-section">
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span id="q-counter"></span>
      <span id="q-percent"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div class="question-card">
    <div class="q-label" id="q-label"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-instruction" id="q-instruction"></div>
    <div id="options-container"></div>
  </div>
  <div class="nav-btns">
    <button class="btn-sec" id="btn-prev" onclick="prevQ()"></button>
    <div class="btn-next-wrap">
      <button class="btn-primary full" id="btn-next" onclick="nextQ()"></button>
    </div>
  </div>
</div>

<div class="results-wrap" id="results-section">
  <div class="results-header">
    <h2 id="res-title"></h2>
    <p id="res-sub"></p>
  </div>
  <div id="dominant-area"></div>
  <div id="social-area"></div>
  <div class="results-grid">
    <div class="card">
      <h3 id="chart-label"></h3>
      <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
    </div>
    <div class="card">
      <h3 id="scores-label"></h3>
      <div class="score-bars" id="score-bars"></div>
    </div>
  </div>
  <div class="action-btns">
    <button class="btn-primary" onclick="window.print()" id="btn-print"></button>
    <button class="btn-sec" onclick="restartQuiz()" id="btn-restart"></button>
  </div>
</div>

// STATE
let lang = 'ro';
let currentQ = 0;
let answers = {}; // { qIndex: { optIndex: 0-5 } } for vark; { qIndex: 0-10 } for social
let radarChart = null;

const DIM_COLORS = { V:'#6366f1', A:'#f59e0b', R:'#10b981', K:'#ef4444' };

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  renderHero();
  if (document.getElementById('quiz-section').style.display !== 'none') renderQuestion();
  if (document.getElementById('results-section').style.display !== 'none') showResults();
}

function t(key) { return T[lang][key] || ''; }

function renderHero() {
  document.getElementById('logo-text').textContent = t('logo');
  document.getElementById('hero-title').textContent = t('heroTitle');
  document.getElementById('hero-desc').textContent = t('heroDesc');
  document.getElementById('meta-q').textContent = t('metaQ');
  document.getElementById('meta-time').textContent = t('metaTime');
  document.getElementById('meta-free').textContent = t('metaFree');
  document.getElementById('start-btn').textContent = t('startBtn');
}

function startQuiz() {
  document.getElementById('hero-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  currentQ = 0;
  answers = {};
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round((currentQ / total) * 100);

  document.getElementById('q-counter').textContent = t('qLabel') + ' ' + (currentQ+1) + ' ' + t('qOf') + ' ' + total;
  document.getElementById('q-percent').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-label').textContent = q.type === 'social' ? t('socialLabel') : 'VARK';
  document.getElementById('q-text').textContent = q.text[lang];

  const instrEl = document.getElementById('q-instruction');
  instrEl.textContent = q.type === 'social' ? t('instructionSocial') : t('instruction');

  const container = document.getElementById('options-container');
  container.innerHTML = '';

  if (q.type === 'vark') {
    const wrap = document.createElement('div');
    wrap.className = 'options-sliders';
    if (!answers[currentQ]) answers[currentQ] = {};

    q.options.forEach((opt, i) => {
      const val = answers[currentQ][i] !== undefined ? answers[currentQ][i] : 0;
      const color = DIM_COLORS[opt.style];
      const row = document.createElement('div');
      row.className = 'opt-row';
      row.innerHTML = `
        <div class="opt-header">
          <span class="opt-dot" style="background:${color}"></span>
          <span class="opt-text-label">${opt.text[lang]}</span>
        </div>
        <div class="slider-wrap">
          <span class="slider-min">0</span>
          <input type="range" min="0" max="5" step="1" value="${val}" 
            style="--thumb-color:${color}" 
            oninput="updateSlider(this,${i},'${opt.style}','${color}')">
          <span class="slider-max">5</span>
          <span class="slider-val" id="sv-${i}" style="color:${color}">${val}</span>
        </div>`;
      // Set thumb color
      const inp = row.querySelector('input');
      inp.style.setProperty('--thumb-color', color);
      inp.addEventListener('input', function() { updateSlider(this, i, opt.style, color); });
      inp.removeAttribute('oninput');
      updateSliderBg(inp, val, color);
      wrap.appendChild(row);
    });
    container.appendChild(wrap);

  } else {
    // Social: single spectrum slider 0-10
    const val = answers[currentQ] !== undefined ? answers[currentQ] : 5;
    const div = document.createElement('div');
    div.className = 'social-spectrum';
    div.innerHTML = `
      <div class="spectrum-labels">
        <span class="spectrum-label">${q.options[1].text[lang]}</span>
        <span class="spectrum-label right">${q.options[0].text[lang]}</span>
      </div>
      <input type="range" min="0" max="10" step="1" value="${val}" id="social-slider" style="width:100%">
    `;
    container.appendChild(div);
    const sl = div.querySelector('input');
    updateSliderBg(sl, val, '#8b5cf6', 10);
    sl.addEventListener('input', function() {
      answers[currentQ] = parseInt(this.value);
      updateSliderBg(this, parseInt(this.value), '#8b5cf6', 10);
    });
    answers[currentQ] = val;
  }

  document.getElementById('btn-prev').textContent = t('prevBtn');
  document.getElementById('btn-prev').disabled = currentQ === 0;
  document.getElementById('btn-next').textContent = currentQ === total-1 ? t('finishBtn') : t('nextBtn');
}

function updateSlider(inp, i, style, color) {
  const val = parseInt(inp.value);
  if (!answers[currentQ]) answers[currentQ] = {};
  answers[currentQ][i] = val;
  const valEl = document.getElementById('sv-'+i);
  if (valEl) { valEl.textContent = val; }
  updateSliderBg(inp, val, color);
}

function updateSliderBg(inp, val, color, max) {
  max = max || 5;
  const pct = (val / max) * 100;
  inp.style.background = `linear-gradient(to right, ${color} ${pct}%, #e2e8f0 ${pct}%)`;
  inp.style.setProperty('accent-color', color);
}

function nextQ() {
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
    window.scrollTo(0,0);
  } else {
    showResults();
  }
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQuestion(); window.scrollTo(0,0); }
}

function restartQuiz() {
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('hero-section').style.display = 'block';
  if (radarChart) { radarChart.destroy(); radarChart = null; }
  window.scrollTo(0,0);
}

function showResults() {
  // Score VARK: sum slider values per dimension
  const scores = { V:0, A:0, R:0, K:0 };
  let socialSum = 0, socialCount = 0;

  questions.forEach((q, qi) => {
    const ans = answers[qi];
    if (ans === undefined || ans === null) return;
    if (q.type === 'vark') {
      if (typeof ans === 'object') {
        q.options.forEach((opt, i) => {
          scores[opt.style] = (scores[opt.style] || 0) + (ans[i] || 0);
        });
      }
    } else {
      socialSum += (typeof ans === 'number' ? ans : 5);
      socialCount++;
    }
  });

  const totalVark = Object.values(scores).reduce((a,b) => a+b, 0) || 1;
  const pcts = {
    V: Math.round(scores.V / totalVark * 100),
    A: Math.round(scores.A / totalVark * 100),
    R: Math.round(scores.R / totalVark * 100),
    K: Math.round(scores.K / totalVark * 100)
  };

  const sorted = Object.entries(pcts).sort((a,b) => b[1]-a[1]);
  const [dom, domPct] = sorted[0];
  const [sec, secPct] = sorted[1];
  const socialPct = socialCount > 0 ? Math.round(socialSum / (socialCount * 10) * 100) : 50;
  const socialType = socialPct >= 65 ? 'collaborative' : (socialPct <= 35 ? 'independent' : 'balanced');

  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('results-section').style.display = 'block';
  window.scrollTo(0,0);

  const tl = T[lang];
  document.getElementById('res-title').textContent = t('resTitle');
  document.getElementById('res-sub').textContent = t('resSub');
  document.getElementById('chart-label').textContent = t('chartLabel');
  document.getElementById('scores-label').textContent = t('scoresLabel');
  document.getElementById('btn-print').textContent = t('btnPrint');
  document.getElementById('btn-restart').textContent = t('btnRestart');

  document.getElementById('dominant-area').innerHTML =
    buildStyleCard(dom, domPct, true, tl) + buildStyleCard(sec, secPct, false, tl);

  document.getElementById('social-area').innerHTML = `
    <div class="social-card">
      <h3>${tl.socialLabel}</h3>
      <div class="social-labels">
        <span>${tl.socialIndep}</span>
        <span>${tl.socialCollab}</span>
      </div>
      <div class="social-track">
        <div class="social-fill" style="width:${socialPct}%"></div>
      </div>
      <p style="color:var(--muted);font-size:.88rem;margin-top:8px">${tl.socialDesc[socialType]}</p>
    </div>`;

  const barContainer = document.getElementById('score-bars');
  barContainer.innerHTML = '';
  sorted.forEach(([style, pct]) => {
    const color = tl.dimColors[style];
    barContainer.innerHTML += `
      <div class="score-row">
        <div class="score-row-header">
          <span class="score-name" style="color:${color}">${tl.dimNames[style]}</span>
          <span class="score-pct" style="color:${color}">${pct}%</span>
        </div>
        <div class="score-track"><div class="score-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
  });

  if (radarChart) radarChart.destroy();
  const ctx = document.getElementById('radarChart').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: [tl.dimNames.V, tl.dimNames.A, tl.dimNames.R, tl.dimNames.K],
      datasets: [{
        data: [pcts.V, pcts.A, pcts.R, pcts.K],
        backgroundColor: 'rgba(79,70,229,0.15)',
        borderColor: '#4f46e5',
        borderWidth: 2,
        pointBackgroundColor: [tl.dimColors.V, tl.dimColors.A, tl.dimColors.R, tl.dimColors.K],
        pointRadius: 5
      }]
    },
    options: {
      scales: { r: { min:0, max:100, ticks:{display:false}, grid:{color:'#e2e8f0'}, pointLabels:{font:{size:11,weight:'600'}} } },
      plugins: { legend:{display:false} }
    }
  });
}

function buildStyleCard(style, pct, isDominant, tl) {
  const color = tl.dimColors[style];
  const title = isDominant ? tl.dominantTitle : tl.secondTitle;
  const techs = tl.dimTech[style].map(t => `<span class="technique-chip">${t}</span>`).join('');
  return `
    <div class="dominant-card" style="border-left:4px solid ${color}">
      <span class="dominant-badge" style="background:${color}22;color:${color}">${title} &bull; ${pct}%</span>
      <h3 style="color:${color}">${tl.dimNames[style]}</h3>
      <p>${tl.dimDesc[style]}</p>
      <div style="font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px">${tl.techniquesLabel}</div>
      <div class="techniques-list">${techs}</div>
    </div>`;
}

renderHero();
</script>
</body>
</html>
